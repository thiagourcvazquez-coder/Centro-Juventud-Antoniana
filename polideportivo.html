      <h2>Futbol Masculino y Femenino</h2>

      <div class="botones">
      <button class="flecha izquierda" onclick="moverSlider(-1)">❮</button>

          <div class="slider-container">
            <div class="grid-futbol" id="slider">

              </div>
              <div class="slider-item">
                <img src="images/femenino2.webp" alt="Futbol Femenino">
              </div>
            </div>
          </div>
        </div>
      </div>
      <button class="flecha derecha" onclick="moverSlider(1)">❯</button>
    </div>

  <!-- ================= MODAL CONTACTO ================= -->
  <div id="modal-contacto" class="modal-overlay" onclick="cerrarModalSiOverlay(event)">
    <div class="modal-box">
      <h2>¡Contactate con nosotros!</h2>
      <form id="form-contacto" action="https://formsubmit.co/thiagovazquezalm@gmail.com" method="POST">
        <label>Nombre</label>
        <input type="text" id="contacto-nombre" name="nombre" placeholder="Tu nombre" required>
        <label>Correo Electrónico</label>
        <input type="email" id="contacto-email" name="email" placeholder="Tu correo electrónico" required>
        <label>Mensaje</label>
        <textarea id="contacto-mensaje" name="mensaje" placeholder="Escribe tu mensaje aquí..." required></textarea>
        <input type="hidden" name="_captcha" value="false">
        <button type="submit" class="btn-enviar">Enviar</button>
      </form>
      <button class="btn-cerrar-modal" onclick="cerrarModal()">✕ Cerrar</button>
    </div>
